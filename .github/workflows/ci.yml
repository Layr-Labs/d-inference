name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-coordinator:
    name: Coordinator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: coordinator/go.mod
      - name: Run tests
        run: cd coordinator && go test -race ./...
      - name: Check formatting
        run: |
          cd coordinator
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

  lint-coordinator:
    name: Coordinator Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: coordinator/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: coordinator

  test-provider:
    name: Provider Tests
    runs-on: macos-15
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          cd provider
          # Skip proxy and server integration tests — they require SIP enabled
          # which is not available on GitHub Actions macOS runners.
          # These tests run locally on real Macs via the pre-push hook.
          cargo test -- --skip proxy::tests --skip server::tests
      - name: Check formatting
        run: cd provider && cargo fmt --check
      - name: Clippy
        run: cd provider && cargo clippy

  lint-console:
    name: Console UI Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: console-ui/package-lock.json
      - name: Install dependencies
        run: cd console-ui && npm ci
      - name: Lint
        run: cd console-ui && npx eslint src/
      - name: Build
        run: cd console-ui && npm run build
