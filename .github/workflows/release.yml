name: Release Provider Bundle

# Release paths:
#   1. tag push `vX.Y.Z`       -> prod  (reviewer approval required)
#   2. tag push `vX.Y.Z-dev.N` -> dev   (auto)
#   3. manual workflow_dispatch with environment input
#
# Parallelism strategy (this is Phase-2 of the original refactor):
#
#   ┌─────────────────────────────────────────────────────────────────┐
#   │               Parallel builds (~5 min wall)                     │
#   │  Rust provider ─┐                                              │
#   │  Swift enclave  ─┤                                              │
#   │  Python runtime ─┤  (uv pip: ~30s vs pip: ~5 min)              │
#   │  Swift app      ─┘                                              │
#   ├─────────────────────────────────────────────────────────────────┤
#   │               Sign + test (~3 min, tests in background)         │
#   │  Sign Python runtime once → copy to bundle + app (skip 2 passes)│
#   ├─────────────────────────────────────────────────────────────────┤
#   │               Notarize + app assembly (~8 min)                  │
#   │  Bundle notarize (bg) ──────────────────────┐                   │
#   │  Assemble .app + DMG (fg) ──────────────────┤ overlap           │
#   │  R2 uploads (bg) ──────────────────────────┤                   │
#   │  DMG notarize (bg) ─────────────────────────┘                   │
#   └─────────────────────────────────────────────────────────────────┘
#
# Coordinator Go tests are NOT in this workflow — they run in CI on
# every push to master. The release is always from a CI-tested commit.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod]
        default: dev

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
  DEVELOPER_ID: "Developer ID Application: Eigen Labs, Inc. (SLDQ2GJ6TL)"
  PBS_TAG: "20260408"
  PBS_PYTHON_VERSION: "3.12.13"

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.environment }}
    steps:
      - id: pick
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == *-dev.* ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "environment=prod" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    name: Build, Sign, Upload, Register
    needs: [resolve-env]
    environment: ${{ needs.resolve-env.outputs.environment }}
    runs-on: macos-26-xlarge
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # --- Import signing certificate ---

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12

          security create-keychain -p "build" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "build" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "build" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm /tmp/cert.p12

      # --- Prepare tools and Python (single download, two extractions) ---

      - name: Prepare build tools and Python
        run: |
          # Install uv for ~10x faster Python package installs
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          # awscli for R2 uploads
          command -v aws &>/dev/null || brew install awscli 2>/dev/null || true

          # Download PBS Python ONCE
          curl -fsSL "https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/cpython-${PBS_PYTHON_VERSION}+${PBS_TAG}-aarch64-apple-darwin-install_only.tar.gz" \
            -o /tmp/pbs-python.tar.gz

          # Extract for Rust linking (clean copy, no pip installs)
          rm -rf /tmp/eigeninference-build-python
          mkdir -p /tmp/eigeninference-build-python
          tar xzf /tmp/pbs-python.tar.gz --strip-components=1 -C /tmp/eigeninference-build-python

          # Extract for Python runtime (will get pip installs)
          tar xzf /tmp/pbs-python.tar.gz -C /tmp/
          mv /tmp/python /tmp/eigeninference-python
          rm -f /tmp/pbs-python.tar.gz

          # Pre-download vllm-mlx source for pip install
          curl -fsSL -o /tmp/vllm-mlx-source.zip \
            'https://github.com/Gajesh2007/vllm-mlx/archive/refs/heads/main.zip'

          /tmp/eigeninference-build-python/bin/python3.12 --version

      - name: Cache cargo registry + target
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            provider/target
          key: cargo-v1-${{ runner.os }}-${{ hashFiles('provider/Cargo.lock') }}
          restore-keys: |
            cargo-v1-${{ runner.os }}-

      # --- Build all four components in parallel ---

      - name: Build all components (parallel)
        env:
          DARKBLOOM_COORDINATOR_URL: ${{ secrets.COORDINATOR_URL }}
          DARKBLOOM_R2_CDN_URL: ${{ vars.R2_CDN }}
        run: |
          set -e

          # Task A: Rust provider
          (
            set -e
            export PYO3_PYTHON=/tmp/eigeninference-build-python/bin/python3.12
            export LIBRARY_PATH=/tmp/eigeninference-build-python/lib
            export DYLD_LIBRARY_PATH=/tmp/eigeninference-build-python/lib
            export RUSTFLAGS="-L native=/tmp/eigeninference-build-python/lib"
            cd provider && cargo build --release
          ) > /tmp/rust-build.log 2>&1 &
          RUST_PID=$!
          echo "Started Rust build (pid $RUST_PID)"

          # Task B: Swift enclave
          (
            set -e
            cd enclave && swift build -c release
          ) > /tmp/enclave-build.log 2>&1 &
          ENCLAVE_PID=$!
          echo "Started enclave build (pid $ENCLAVE_PID)"

          # Task C: Python runtime (uv is ~10x faster than pip)
          (
            set -e
            PYTHON=/tmp/eigeninference-python/bin/python3.12

            "$HOME/.local/bin/uv" pip install --python "$PYTHON" --quiet --no-cache-dir \
              'mlx-lm>=0.31.2' \
              /tmp/vllm-mlx-source.zip \
              tokenizers
            "$HOME/.local/bin/uv" pip install --python "$PYTHON" --quiet --no-cache-dir --upgrade 'mlx-lm>=0.31.2'

            "$PYTHON" -c "import vllm_mlx; print(f'vllm-mlx {vllm_mlx.__version__}')"
            "$PYTHON" -c "import mlx_lm; print(f'mlx-lm {mlx_lm.__version__}')"
            "$PYTHON" -c "from vllm_mlx.server import app; print('vllm-mlx server imports OK')"

            # Trim bloat
            cd /tmp/eigeninference-python/lib/python*/site-packages
            rm -rf torch* gradio* opencv* cv2* pandas* pyarrow* \
                   sympy* networkx* mcp* miniaudio* pydub* datasets*
            find /tmp/eigeninference-python -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true
            find /tmp/eigeninference-python -name "*.pyc" -delete 2>/dev/null || true
            "$PYTHON" -m compileall -q /tmp/eigeninference-python/lib/python3.12/site-packages/ 2>/dev/null || true
            rm -f /tmp/eigeninference-python/lib/python*/EXTERNALLY-MANAGED
          ) > /tmp/python-build.log 2>&1 &
          PYTHON_PID=$!
          echo "Started Python runtime build (pid $PYTHON_PID)"

          # Task D: Swift macOS app (compile only — assembly happens after signing)
          (
            set -e
            cd app/EigenInference && swift build -c release
          ) > /tmp/app-build.log 2>&1 &
          APP_PID=$!
          echo "Started Swift app build (pid $APP_PID)"

          # Wait for all builds, report failures
          FAILED=0
          for entry in "$RUST_PID:Rust:rust" "$ENCLAVE_PID:Enclave:enclave" "$PYTHON_PID:Python:python" "$APP_PID:App:app"; do
            PID="${entry%%:*}"; rest="${entry#*:}"; NAME="${rest%%:*}"; LOG="${rest##*:}"
            if wait "$PID"; then
              echo "✓ $NAME build complete"
              tail -3 "/tmp/${LOG}-build.log" 2>/dev/null || true
            else
              echo "✗ $NAME build FAILED:"
              cat "/tmp/${LOG}-build.log"
              FAILED=1
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

      # --- Test (background) + Sign + Bundle + Hash ---

      - name: Test, sign, bundle, and hash
        id: artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: "SLDQ2GJ6TL"
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"

          # ---- Provider tests in background ----
          (
            set -e
            export PYO3_PYTHON=/tmp/eigeninference-build-python/bin/python3.12
            export LIBRARY_PATH=/tmp/eigeninference-build-python/lib
            export DYLD_LIBRARY_PATH=/tmp/eigeninference-build-python/lib
            export RUSTFLAGS="-L native=/tmp/eigeninference-build-python/lib"
            cd provider && cargo test -- --skip proxy::tests --skip server::tests
          ) > /tmp/test.log 2>&1 &
          TEST_PID=$!
          echo "Started provider tests (pid $TEST_PID)"

          # ---- Sign Python runtime Mach-Os ONCE (covers bundle + app) ----
          sign_macho_tree() {
            local dir="$1"
            find "$dir" -type f | while read -r file; do
              if file "$file" | grep -q "Mach-O"; then
                codesign --force --sign "$DEVELOPER_ID" \
                  --keychain "$KEYCHAIN_PATH" --options runtime --timestamp \
                  "$file" || return 1
              fi
            done
          }
          echo "Signing Python runtime Mach-Os..."
          if ! sign_macho_tree /tmp/eigeninference-python; then
            echo "Python runtime codesign failed — retrying in 30s"
            sleep 30
            sign_macho_tree /tmp/eigeninference-python
          fi
          echo "✓ Python runtime signed"

          # ---- Assemble provider bundle ----
          mkdir -p /tmp/eigeninference-bundle/bin /tmp/eigeninference-bundle/python

          cp provider/target/release/darkbloom /tmp/eigeninference-bundle/bin/
          cp enclave/.build/release/eigeninference-enclave /tmp/eigeninference-bundle/bin/

          # Copy SIGNED Python base to bundle (no site-packages).
          # These files are already signed from the runtime pass above.
          cp -R /tmp/eigeninference-python/bin /tmp/eigeninference-bundle/python/
          cp -R /tmp/eigeninference-python/lib /tmp/eigeninference-bundle/python/
          rm -rf /tmp/eigeninference-bundle/python/lib/python3.12/site-packages

          # Fix libpython linkage in darkbloom
          PYTHON_LOAD_PATH=$(otool -L /tmp/eigeninference-bundle/bin/darkbloom | awk '/libpython3\.12\.dylib/ {print $1; exit}')
          if [ -z "$PYTHON_LOAD_PATH" ]; then
            echo "ERROR: could not find libpython linkage in darkbloom"
            exit 1
          fi
          install_name_tool -change \
            "$PYTHON_LOAD_PATH" \
            "@executable_path/../python/lib/libpython3.12.dylib" \
            /tmp/eigeninference-bundle/bin/darkbloom

          # Sign binaries (hardened runtime + entitlements)
          codesign --force --sign "$DEVELOPER_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements scripts/entitlements.plist \
            --options runtime \
            /tmp/eigeninference-bundle/bin/darkbloom

          codesign --force --sign "$DEVELOPER_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements scripts/entitlements.plist \
            --options runtime \
            /tmp/eigeninference-bundle/bin/eigeninference-enclave

          # Verify key signatures
          codesign --verify --verbose /tmp/eigeninference-bundle/bin/darkbloom
          codesign --verify --verbose /tmp/eigeninference-bundle/bin/eigeninference-enclave
          codesign --verify --verbose /tmp/eigeninference-bundle/python/bin/python3.12
          codesign --verify --verbose /tmp/eigeninference-bundle/python/lib/libpython3.12.dylib

          cd /tmp && tar czf eigeninference-bundle-macos-arm64.tar.gz -C eigeninference-bundle .
          echo "Bundle created: $(du -h /tmp/eigeninference-bundle-macos-arm64.tar.gz | cut -f1)"

          # ---- Compute Python hashes (stable — not affected by stapling) ----
          # Binary and bundle hashes are computed AFTER notarization stapling
          # in the next step, since stapling modifies the Mach-O binaries.
          PYTHON_BIN="/tmp/eigeninference-python/bin/python3.12"
          PYTHON_HASH=$(shasum -a 256 "$PYTHON_BIN" | cut -d' ' -f1)
          echo "Python hash: $PYTHON_HASH"
          echo "PYTHON_HASH=$PYTHON_HASH" >> "$GITHUB_ENV"

          PYTHON_LIB_DIR=$("$PYTHON_BIN" -c "import sysconfig; print(sysconfig.get_path('stdlib'))")
          SITE_PACKAGES_DIR=$("$PYTHON_BIN" -c "import site; print(site.getsitepackages()[0])")
          RUNTIME_HASH=$("$PYTHON_BIN" -c "
          import hashlib, os, sys
          d = sys.argv[1]
          files = []
          for r, dirs, fs in os.walk(d):
              dirs[:] = [name for name in dirs if name != '__pycache__']
              for f in fs:
                  if f.endswith('.pyc'):
                      continue
                  files.append(os.path.join(r, f))
          files.sort()
          print(f'Total files: {len(files)}', file=sys.stderr)
          final = hashlib.sha256()
          for path in files:
              h = hashlib.sha256()
              with open(path, 'rb') as fh:
                  while True:
                      chunk = fh.read(65536)
                      if not chunk:
                          break
                      h.update(chunk)
              final.update(h.digest())
          print(final.hexdigest())
          " "$PYTHON_LIB_DIR")
          echo "Runtime hash: $RUNTIME_HASH"
          echo "RUNTIME_HASH=$RUNTIME_HASH" >> "$GITHUB_ENV"

          # Create runtime tarballs
          cd /tmp && tar czf eigeninference-python-macos-arm64.tar.gz -C eigeninference-python .
          cd /tmp && tar czf eigeninference-site-packages.tar.gz -C "$SITE_PACKAGES_DIR" .

          # ---- Wait for provider tests ----
          echo "Waiting for provider tests..."
          if ! wait $TEST_PID; then
            echo "Provider tests FAILED:"
            cat /tmp/test.log
            exit 1
          fi
          echo "✓ Provider tests passed"

      # --- Notarize bundle + build app + upload (maximally parallel) ---

      - name: Notarize, build app, and upload
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: "SLDQ2GJ6TL"
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_CDN: ${{ vars.R2_CDN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"

          # ---- Task A: Notarize provider bundle (background) ----
          (
            set -e
            ditto -c -k --keepParent /tmp/eigeninference-bundle /tmp/eigeninference-notarize.zip
            xcrun notarytool submit /tmp/eigeninference-notarize.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 10m
          ) > /tmp/notarize-bundle.log 2>&1 &
          NOTARIZE_BUNDLE_PID=$!
          echo "Started bundle notarization (pid $NOTARIZE_BUNDLE_PID)"

          # ---- Task B: Build macOS app + DMG (foreground, overlaps with notarize) ----
          APP_BIN=$(cd app/EigenInference && swift build -c release --show-bin-path)/EigenInference

          APP_DIR="/tmp/EigenInference.app"
          CONTENTS="$APP_DIR/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"
          PYTHON_ROOT="$CONTENTS/python"
          rm -rf "$APP_DIR"
          mkdir -p "$MACOS" "$RESOURCES" "$PYTHON_ROOT"

          cat > "$CONTENTS/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>EigenInference</string>
            <key>CFBundleDisplayName</key><string>EigenInference</string>
            <key>CFBundleIdentifier</key><string>io.darkbloom.provider</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>EigenInference</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          cp "$APP_BIN" "$MACOS/EigenInference"
          cp /tmp/eigeninference-bundle/bin/darkbloom "$MACOS/darkbloom"
          cp /tmp/eigeninference-bundle/bin/eigeninference-enclave "$MACOS/eigeninference-enclave" 2>/dev/null || true

          # Copy already-signed Python runtime into app (skip re-signing individual files)
          cp -a /tmp/eigeninference-python/. "$PYTHON_ROOT/"

          # Sign app binaries (entitlements)
          for bin in "$MACOS"/*; do
            codesign --force --options runtime \
              --entitlements scripts/entitlements.plist \
              --sign "$DEVELOPER_ID" --keychain "$KEYCHAIN_PATH" "$bin"
          done
          # Sign the .app bundle itself
          codesign --force --options runtime --no-strict \
            --entitlements scripts/entitlements.plist \
            --sign "$DEVELOPER_ID" --keychain "$KEYCHAIN_PATH" "$APP_DIR"

          # Create DMG
          DMG_TMP="/tmp/dmg-staging"
          rm -rf "$DMG_TMP"
          mkdir -p "$DMG_TMP"
          cp -a "$APP_DIR" "$DMG_TMP/"
          ln -s /Applications "$DMG_TMP/Applications"
          hdiutil create -volname "Darkbloom" -srcfolder "$DMG_TMP" \
            -ov -format UDZO "/tmp/Darkbloom.dmg" >/dev/null
          rm -rf "$DMG_TMP"
          echo "DMG built: $(du -h /tmp/Darkbloom.dmg | cut -f1)"

          # ---- Wait for bundle notarization ----
          echo "Waiting for bundle notarization..."
          if ! wait "$NOTARIZE_BUNDLE_PID"; then
            echo "!! Bundle notarization failed:"
            tail -80 /tmp/notarize-bundle.log
            exit 1
          fi
          echo "Bundle notarization complete"
          tail -5 /tmp/notarize-bundle.log

          # Staple notarization tickets to bundle binaries
          xcrun stapler staple /tmp/eigeninference-bundle/bin/darkbloom || true
          xcrun stapler staple /tmp/eigeninference-bundle/bin/eigeninference-enclave || true

          # Recreate bundle tarball with stapled binaries
          cd /tmp && tar czf eigeninference-bundle-macos-arm64.tar.gz -C eigeninference-bundle .

          # Compute final hashes AFTER stapling (stapling modifies the binaries)
          BINARY_HASH=$(shasum -a 256 /tmp/eigeninference-bundle/bin/darkbloom | cut -d' ' -f1)
          BUNDLE_HASH=$(shasum -a 256 /tmp/eigeninference-bundle-macos-arm64.tar.gz | cut -d' ' -f1)
          echo "Binary hash (signed+stapled): $BINARY_HASH"
          echo "Bundle hash: $BUNDLE_HASH"
          echo "BINARY_HASH=$BINARY_HASH" >> "$GITHUB_ENV"
          echo "BUNDLE_HASH=$BUNDLE_HASH" >> "$GITHUB_ENV"

          # ---- Task C: Notarize DMG (background) ----
          (
            xcrun notarytool submit "/tmp/Darkbloom.dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "/tmp/Darkbloom.dmg"
          ) > /tmp/notarize-dmg.log 2>&1 &
          NOTARIZE_DMG_PID=$!
          echo "Started DMG notarization (pid $NOTARIZE_DMG_PID)"

          # ---- Task D: Upload bundles to R2 (overlaps with DMG notarize) ----
          # Wait on explicit PIDs — bare `wait` would also block on DMG notarize.
          PREFIX="s3://${R2_BUCKET}/releases/v${VERSION}"
          aws s3 cp /tmp/eigeninference-bundle-macos-arm64.tar.gz "${PREFIX}/eigeninference-bundle-macos-arm64.tar.gz" --endpoint-url "$R2_ENDPOINT" --only-show-errors & UL1=$!
          aws s3 cp /tmp/eigeninference-python-macos-arm64.tar.gz "${PREFIX}/eigeninference-python-macos-arm64.tar.gz" --endpoint-url "$R2_ENDPOINT" --only-show-errors & UL2=$!
          aws s3 cp /tmp/eigeninference-site-packages.tar.gz      "${PREFIX}/eigeninference-site-packages.tar.gz"      --endpoint-url "$R2_ENDPOINT" --only-show-errors & UL3=$!
          aws s3 cp /tmp/vllm-mlx-source.zip                      "${PREFIX}/vllm-mlx-source.zip"                      --endpoint-url "$R2_ENDPOINT" --only-show-errors & UL4=$!
          wait $UL1 $UL2 $UL3 $UL4
          echo "All bundle uploads complete"

          # Compute template hashes while DMG notarizes
          R2_CDN="${R2_CDN:-https://pub-7cbee059c80c46ec9c071dbee2726f8a.r2.dev}"
          TEMPLATE_HASHES=""
          for name in qwen3.5 trinity gemma4 minimax; do
            HASH=$(curl -fsSL "$R2_CDN/templates/${name}.jinja" 2>/dev/null | shasum -a 256 | cut -d' ' -f1)
            if [ -n "$HASH" ] && [ "$HASH" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
              [ -n "$TEMPLATE_HASHES" ] && TEMPLATE_HASHES+=","
              TEMPLATE_HASHES+="${name}=${HASH}"
              echo "Template $name: ${HASH:0:16}..."
            fi
          done
          echo "TEMPLATE_HASHES=$TEMPLATE_HASHES" >> "$GITHUB_ENV"

          # ---- Wait for DMG notarization (best-effort) ----
          echo "Waiting for DMG notarization..."
          if wait "$NOTARIZE_DMG_PID" 2>/dev/null; then
            echo "DMG notarization complete"
          else
            echo "DMG notarization failed (non-fatal):"
            tail -20 /tmp/notarize-dmg.log 2>/dev/null || true
          fi

          # Upload DMG (after notarize+staple completes)
          aws s3 cp /tmp/Darkbloom.dmg "${PREFIX}/Darkbloom.dmg"     --endpoint-url "$R2_ENDPOINT" --only-show-errors &
          aws s3 cp /tmp/Darkbloom.dmg "s3://${R2_BUCKET}/releases/latest/Darkbloom.dmg" --endpoint-url "$R2_ENDPOINT" --only-show-errors &
          wait
          echo "DMG uploaded to R2"

      # --- Register with coordinator ---

      - name: Register release with coordinator
        env:
          COORDINATOR_URL: ${{ secrets.COORDINATOR_URL }}
          RELEASE_KEY: ${{ secrets.RELEASE_KEY }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_URL="${R2_PUBLIC_URL}/releases/v${VERSION}/eigeninference-bundle-macos-arm64.tar.gz"

          TAG_MSG=$(git tag -l --format='%(contents:subject)%0a%(contents:body)' "$GITHUB_REF_NAME" 2>/dev/null || echo "")
          if [ -z "$TAG_MSG" ] || [ "$TAG_MSG" = $'\n' ]; then
            TAG_MSG="Release v${VERSION}"
          fi

          python3 -c "
          import json, subprocess, sys
          payload = {
              'version': '${VERSION}',
              'platform': 'macos-arm64',
              'binary_hash': '${{ env.BINARY_HASH }}',
              'bundle_hash': '${{ env.BUNDLE_HASH }}',
              'python_hash': '${{ env.PYTHON_HASH }}',
              'runtime_hash': '${{ env.RUNTIME_HASH }}',
              'template_hashes': '${{ env.TEMPLATE_HASHES }}',
              'url': '${BUNDLE_URL}',
              'changelog': '''${TAG_MSG}'''.strip()
          }
          print(json.dumps(payload))
          " > /tmp/release-payload.json

          curl -fsSL -X POST "${COORDINATOR_URL}/v1/releases" \
            -H "Authorization: Bearer ${RELEASE_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/release-payload.json
          echo ""
          echo "Release v${VERSION} registered with coordinator"

      # --- Cleanup keychain ---

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # --- GitHub Release ---

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/release-notes.md <<'NOTES'
          ## Provider v${{ github.ref_name }}

          **Binary hash (signed):** `${{ env.BINARY_HASH }}`
          **Bundle hash:** `${{ env.BUNDLE_HASH }}`
          **Runtime hash (vllm-mlx):** `${{ env.RUNTIME_HASH }}`
          **Signed by:** Developer ID Application: Eigen Labs, Inc. (SLDQ2GJ6TL)
          **Notarized:** Yes

          ### Install
          ```bash
          curl -fsSL ${{ secrets.COORDINATOR_URL }}/install.sh | bash
          ```
          NOTES
          gh release create "${{ github.ref_name }}" \
            /tmp/eigeninference-bundle-macos-arm64.tar.gz \
            /tmp/Darkbloom.dmg \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            --generate-notes
